<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BeastLife — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --surface2:  #181818;
    --border:    #222222;
    --accent:    #ff3c00;
    --accent2:   #ff7a00;
    --gold:      #f5c842;
    --text:      #f0ede8;
    --muted:     #666;
    --success:   #2ecc71;
    --radius:    4px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
  }

  .top-stripe { background: var(--accent); height: 3px; width: 100%; }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--text); }
  .logo span { color: var(--accent); }

  .nav-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .hero { padding: 60px 40px 40px; max-width: 1100px; margin: 0 auto; }

  .profile-grid { display: grid; grid-template-columns: auto 1fr; gap: 40px; align-items: start; }

  .avatar-wrap { position: relative; }

  .avatar {
    width: 120px; height: 120px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: #fff;
    letter-spacing: 2px; position: relative;
  }

  .avatar::after {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    border: 2px solid var(--accent); opacity: 0.4;
  }

  .status-dot {
    position: absolute; bottom: 6px; right: 6px; width: 14px; height: 14px;
    background: var(--success); border-radius: 50%; border: 2px solid var(--bg);
  }

  .label-tag {
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
  }

  .profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 64px; line-height: 1; letter-spacing: 2px; margin-bottom: 12px; }

  .profile-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }

  .meta-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 14px; font-size: 12px;
    color: var(--muted); font-family: 'Space Mono', monospace;
  }

  .meta-chip .chip-icon { font-size: 13px; }
  .meta-chip .chip-val { color: var(--text); font-weight: 600; }

  .stats-row { display: flex; gap: 2px; margin-top: 8px; }

  .stat-block {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    padding: 16px 20px; border-radius: var(--radius);
  }
  .stat-block:first-child { border-radius: 4px 0 0 4px; }
  .stat-block:last-child  { border-radius: 0 4px 4px 0; }

  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-family: 'Space Mono', monospace; }

  .goal-banner { max-width: 1100px; margin: 0 auto 50px; padding: 0 40px; }
  .goal-inner {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--accent); border-radius: var(--radius);
    padding: 20px 28px; display: flex; align-items: center; gap: 20px;
  }
  .goal-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; flex-shrink: 0; }
  .goal-text { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; }

  .section { max-width: 1100px; margin: 0 auto; padding: 0 40px 80px; }

  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px;
  }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; }
  .section-title span { color: var(--accent); }
  .section-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  .active-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px; }

  .active-item {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    animation: fadeUp 0.4s ease both;
  }

  .active-badge {
    background: rgba(255,60,0,0.15); border: 1px solid rgba(255,60,0,0.3);
    color: var(--accent); font-family: 'Space Mono', monospace; font-size: 10px;
    padding: 3px 10px; border-radius: 100px; letter-spacing: 1px; flex-shrink: 0;
  }

  .active-badge.COMPLETED { background: rgba(46,204,113,0.15); border-color: rgba(46,204,113,0.3); color: var(--success); }
  .active-badge.FAILED    { background: rgba(255,60,0,0.1);    border-color: rgba(255,60,0,0.2);   color: #ff6b6b; }

  .active-name { font-weight: 600; flex: 1; }
  .active-meta { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .no-active {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: var(--radius); padding: 32px; text-align: center;
    color: var(--muted); font-size: 13px; font-family: 'Space Mono', monospace;
  }

  .challenge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

  .challenge-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; display: flex;
    flex-direction: column; transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.5s ease both; position: relative;
  }

  .challenge-card:hover { border-color: #333; transform: translateY(-3px); }
  .challenge-card.enrolled { border-color: rgba(46,204,113,0.4); }

  .enrolled-tag {
    position: absolute; top: 12px; right: 12px;
    background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4);
    color: var(--success); font-family: 'Space Mono', monospace; font-size: 9px;
    padding: 3px 8px; border-radius: 100px; letter-spacing: 1px;
  }

  .card-bar { height: 3px; width: 100%; }
  .card-bar.BEGINNER     { background: var(--success); }
  .card-bar.INTERMEDIATE { background: var(--accent2); }
  .card-bar.ADVANCED     { background: var(--accent); }

  .card-body { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 12px; }

  .card-type-row { display: flex; align-items: center; gap: 8px; }

  .type-tag {
    font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 100px;
  }

  .diff-tag { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 2px 8px; border-radius: 100px; }
  .diff-tag.BEGINNER     { background: rgba(46,204,113,0.12); color: var(--success); }
  .diff-tag.INTERMEDIATE { background: rgba(255,122,0,0.12);  color: var(--accent2); }
  .diff-tag.ADVANCED     { background: rgba(255,60,0,0.12);   color: var(--accent);  }

  .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; line-height: 1.1; }
  .card-desc { font-size: 13px; color: #999; line-height: 1.55; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-duration { display: flex; align-items: center; gap: 6px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .card-duration::before { content: '⏳'; font-size: 12px; }

  .card-footer { display: flex; gap: 8px; padding: 0 24px 24px; }

  .btn { flex: 1; padding: 11px 16px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; border: none; transition: all 0.18s; letter-spacing: 0.3px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #e03500; }
  .btn-primary:disabled { background: #333; color: var(--muted); cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: #444; background: var(--surface2); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px); z-index: 500; display: none;
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid #2a2a2a; border-radius: 8px;
    max-width: 620px; width: 100%; max-height: 88vh; overflow-y: auto;
    animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes modalIn { from { opacity: 0; transform: scale(0.92) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .modal-bar { height: 4px; width: 100%; border-radius: 8px 8px 0 0; }
  .modal-head { padding: 28px 28px 0; }
  .modal-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .modal-name { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 1px; line-height: 1.1; margin-bottom: 8px; }
  .modal-duration { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .modal-body { padding: 0 28px 28px; }
  .modal-section { margin-top: 22px; }

  .modal-section-label {
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .modal-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .modal-desc { font-size: 14px; color: #aaa; line-height: 1.65; }

  .benefit-list, .proof-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .benefit-list li { display: flex; gap: 10px; font-size: 13px; color: #bbb; align-items: flex-start; }
  .benefit-list li::before { content: '✓'; color: var(--success); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

  .proof-list { counter-reset: proof; }
  .proof-list li { display: flex; gap: 10px; font-size: 13px; color: #bbb; counter-increment: proof; align-items: flex-start; }
  .proof-list li::before {
    content: counter(proof); background: var(--surface2); border: 1px solid var(--border);
    width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 10px; font-family: 'Space Mono', monospace;
    flex-shrink: 0; margin-top: 1px;
  }

  .reward-box { background: rgba(245,200,66,0.06); border: 1px solid rgba(245,200,66,0.2); border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: var(--gold); display: flex; gap: 10px; align-items: flex-start; }
  .reward-box::before { content: '🏆'; font-size: 18px; flex-shrink: 0; }

  .lose-box { background: rgba(255,60,0,0.06); border: 1px solid rgba(255,60,0,0.2); border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: #ff6b6b; display: flex; gap: 10px; align-items: flex-start; }
  .lose-box::before { content: '💀'; font-size: 18px; flex-shrink: 0; }

  .modal-footer { padding: 20px 28px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px; }

  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 12px 24px; font-size: 13px; font-weight: 600;
    z-index: 9000; transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    opacity: 0; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(46,204,113,0.4); color: var(--success); }
  .toast.error   { border-color: rgba(255,60,0,0.4);   color: var(--accent);  }

  .loader-wrap { display: flex; align-items: center; justify-content: center; min-height: 200px; flex-direction: column; gap: 16px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes fadeUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  footer { border-top: 1px solid var(--border); padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; }
  .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--muted); }
  .footer-logo span { color: var(--accent); }
  .footer-note { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  .error-state { max-width: 1100px; margin: 80px auto; padding: 0 40px; text-align: center; }
  .error-code { font-family: 'Bebas Neue', sans-serif; font-size: 120px; color: var(--border); line-height: 1; }
  .error-msg { font-size: 16px; color: var(--muted); margin-top: 12px; }

  @media (max-width: 680px) {
    nav { padding: 16px 20px; }
    .hero, .goal-banner, .section { padding-left: 20px; padding-right: 20px; }
    .profile-grid { grid-template-columns: 1fr; gap: 20px; }
    .profile-name { font-size: 42px; }
    .avatar { width: 80px; height: 80px; font-size: 36px; }
    .stats-row { flex-wrap: wrap; }
    .stat-block { min-width: calc(50% - 1px); }
    .challenge-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 12px; text-align: center; }
    .modal { border-radius: 0; max-height: 100vh; }
    .modal-name { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="top-stripe"></div>

<nav>
  <div class="logo">BEAST<span>LIFE</span></div>
  <div class="nav-pill" id="navStatus">LOADING...</div>
</nav>

<div class="error-state" id="errorState" style="display:none">
  <div class="error-code">404</div>
  <div class="error-msg" id="errorMsg">Profile not found.</div>
</div>

<div id="mainContent" style="display:none">

  <div class="hero">
    <div class="profile-grid">
      <div class="avatar-wrap">
        <div class="avatar" id="avatarInitial">?</div>
        <div class="status-dot"></div>
      </div>
      <div class="profile-info">
        <div class="label-tag">BeastLife Member</div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-meta" id="profileMeta"></div>
        <div class="stats-row" id="statsRow"></div>
      </div>
    </div>
  </div>

  <div class="goal-banner">
    <div class="goal-inner">
      <div class="goal-label">PRIMARY GOAL</div>
      <div class="goal-text" id="profileGoal">—</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">MY <span>CHALLENGES</span></div>
      <div class="section-count" id="activeCount">0 ACTIVE</div>
    </div>
    <div class="active-list" id="activeList">
      <div class="loader-wrap"><div class="spinner"></div><span>Loading challenges...</span></div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">ALL <span>CHALLENGES</span></div>
      <div class="section-count" id="allCount">0 AVAILABLE</div>
    </div>
    <div class="challenge-grid" id="challengeGrid">
      <div class="loader-wrap"><div class="spinner"></div><span>Fetching challenges...</span></div>
    </div>
  </div>

</div>

<footer>
  <div class="footer-logo">BEAST<span>LIFE</span></div>
  <div class="footer-note">BUILT DIFFERENT. NO EXCUSES.</div>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-bar" id="modalBar"></div>
    <div class="modal-head">
      <div class="modal-type-row" id="modalTypeTags"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-duration" id="modalDuration"></div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-label">What it is</div>
        <div class="modal-desc" id="modalDesc"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-label">Benefits</div>
        <ul class="benefit-list" id="modalBenefits"></ul>
      </div>
      <div class="modal-section">
        <div class="modal-section-label">Win Reward</div>
        <div class="reward-box" id="modalReward"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-label">Lose Consequences</div>
        <div class="lose-box" id="modalLose"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-label">How to Submit Proof</div>
        <ol class="proof-list" id="modalProof"></ol>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" id="modalJoinBtn" onclick="joinFromModal()">JOIN THIS CHALLENGE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const API = window.location.origin;

// Pull profileId from URL: /profile/:profileId
const profileId = window.location.pathname.split('/').filter(Boolean).pop();

// ── STATE ───────────────────────────────────────────────
let USER           = null;
let ALL_CHALLENGES = [];
// Set of challenge keys the user is ACTIVE in (not _id, key)
let enrolledKeys   = new Set();
let activeModalChallenge = null;

// ── BOOT ────────────────────────────────────────────────
(async () => {
  // Load profile and challenges in parallel
  await Promise.all([loadProfile(), loadChallenges()]);
  // Re-render cards after both are available so enrolled state is correct
  renderAllChallenges();
})();

// ── LOAD PROFILE ────────────────────────────────────────
async function loadProfile() {
  try {
    // Fetch JSON — backend checks Accept header; JS fetch sends application/json by default
    const res = await fetch(`${API}/profile/${profileId}`, {
      headers: { Accept: "application/json" }
    });
    if (!res.ok) throw new Error(res.status === 404 ? 'Profile not found.' : 'Server error.');
    USER = await res.json();

    // Build enrolled keys set from user's challenges
    (USER.challenges || []).forEach(c => {
      if (c.status === 'ACTIVE') enrolledKeys.add(c.key);
    });

    renderProfile();
    renderActiveChallenges();
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('navStatus').textContent = 'PROFILE LOADED';
  } catch (err) {
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('navStatus').textContent = 'ERROR';
  }
}

// ── LOAD ALL CHALLENGES ─────────────────────────────────
async function loadChallenges() {
  try {
    const res = await fetch(`${API}/challenges`);
    if (!res.ok) throw new Error('Failed to load challenges.');
    ALL_CHALLENGES = await res.json();
  } catch (err) {
    document.getElementById('challengeGrid').innerHTML =
      `<div class="loader-wrap" style="color:#ff3c00">Failed to load challenges.</div>`;
  }
}

// ── RENDER PROFILE ──────────────────────────────────────
function renderProfile() {
  const u = USER;
  document.title = `${u.name} — BeastLife`;

  document.getElementById('avatarInitial').textContent = u.name?.[0]?.toUpperCase() || '?';
  document.getElementById('profileName').textContent   = u.name || '—';
  document.getElementById('profileGoal').textContent   = u.goal || '—';

  const meta = document.getElementById('profileMeta');
  const chips = [
    { icon: '🎂', label: 'DOB',    val: u.dob         || '—' },
    { icon: '⚖️',  label: 'WEIGHT', val: u.weight      || '—' },
    { icon: '💪',  label: 'LEVEL',  val: u.activeLevel || '—' },
    { icon: '🏋️',  label: 'GYM',    val: u.gymSince    || '—' },
  ];
  meta.innerHTML = chips.map(c =>
    `<div class="meta-chip">
      <span class="chip-icon">${c.icon}</span>
      <span style="color:var(--muted);font-size:10px">${c.label}</span>
      <span class="chip-val">${c.val}</span>
    </div>`
  ).join('');

  const challenges = USER.challenges || [];
  const active     = challenges.filter(c => c.status === 'ACTIVE').length;
  const completed  = challenges.filter(c => c.status === 'COMPLETED').length;
  const total      = challenges.length;

  document.getElementById('statsRow').innerHTML = [
    { num: active,    label: 'ACTIVE' },
    { num: completed, label: 'COMPLETED' },
    { num: total,     label: 'TOTAL JOINED' },
  ].map(s =>
    `<div class="stat-block">
      <div class="stat-num">${s.num}</div>
      <div class="stat-label">${s.label}</div>
    </div>`
  ).join('');
}

// ── RENDER ACTIVE CHALLENGES ────────────────────────────
function renderActiveChallenges() {
  const list   = document.getElementById('activeList');
  const count  = document.getElementById('activeCount');
  const active = (USER.challenges || []).filter(c => c.status === 'ACTIVE');

  count.textContent = `${active.length} ACTIVE`;

  if (!active.length) {
    list.innerHTML = `<div class="no-active">No active challenges yet. Pick one below and get to work. 💪</div>`;
    return;
  }

  list.innerHTML = active.map((c, i) =>
    `<div class="active-item" style="animation-delay:${i * 0.07}s">
      <div class="active-badge ${c.status}">${c.status}</div>
      <div class="active-name">${c.name || c.key}</div>
      <div class="active-meta">${c.type || ''} · Joined ${formatDate(c.joinedAt)}</div>
    </div>`
  ).join('');
}

// ── RENDER ALL CHALLENGES ───────────────────────────────
function renderAllChallenges() {
  const grid  = document.getElementById('challengeGrid');
  const count = document.getElementById('allCount');

  if (!ALL_CHALLENGES.length) {
    grid.innerHTML = `<div class="loader-wrap">No challenges available.</div>`;
    return;
  }

  count.textContent = `${ALL_CHALLENGES.length} AVAILABLE`;

  grid.innerHTML = ALL_CHALLENGES.map((c, i) => {
    // Use challengeKey (_id = key in our backend) to check enrollment
    const isEnrolled = enrolledKeys.has(c.key);
    return `
    <div class="challenge-card ${isEnrolled ? 'enrolled' : ''}" style="animation-delay:${i * 0.06}s">
      <div class="card-bar ${c.difficulty}"></div>
      ${isEnrolled ? '<div class="enrolled-tag">ACTIVE</div>' : ''}
      <div class="card-body">
        <div class="card-type-row">
          <span class="type-tag">${c.type}</span>
          <span class="diff-tag ${c.difficulty}">${c.difficulty}</span>
        </div>
        <div class="card-name">${c.name}</div>
        <div class="card-desc">${c.description}</div>
        <div class="card-duration">${c.duration}</div>
      </div>
      <div class="card-footer">
        <button class="btn btn-outline" onclick="openModal('${c.key}')">SEE MORE</button>
        <button
          class="btn btn-primary"
          onclick="joinChallenge('${c.key}', this)"
          ${isEnrolled ? 'disabled' : ''}
        >${isEnrolled ? 'ENROLLED' : 'JOIN'}</button>
      </div>
    </div>`;
  }).join('');
}

// ── OPEN MODAL ──────────────────────────────────────────
function openModal(challengeKey) {
  const c = ALL_CHALLENGES.find(x => x.key === challengeKey);
  if (!c) return;

  activeModalChallenge = c;
  const isEnrolled = enrolledKeys.has(c.key);

  const diffColor = { BEGINNER: '#2ecc71', INTERMEDIATE: '#ff7a00', ADVANCED: '#ff3c00' };

  document.getElementById('modalBar').style.background =
    `linear-gradient(90deg, ${diffColor[c.difficulty] || '#ff3c00'}, ${diffColor[c.difficulty] || '#ff3c00'}88)`;

  document.getElementById('modalTypeTags').innerHTML =
    `<span class="type-tag">${c.type}</span>
     <span class="diff-tag ${c.difficulty}">${c.difficulty}</span>`;

  document.getElementById('modalName').textContent     = c.name;
  document.getElementById('modalDuration').textContent = `⏳ ${c.duration} · ${c.durationDays} days`;
  document.getElementById('modalDesc').textContent     = c.description;

  document.getElementById('modalBenefits').innerHTML =
    (c.benefits || []).map(b => `<li>${b}</li>`).join('');

  document.getElementById('modalReward').textContent = c.winningReward;
  document.getElementById('modalLose').textContent   = c.losingConsequences;

  document.getElementById('modalProof').innerHTML =
    (c.proofInstructions || []).map(p => `<li>${p}</li>`).join('');

  const joinBtn = document.getElementById('modalJoinBtn');
  joinBtn.textContent = isEnrolled ? 'ALREADY ENROLLED' : 'JOIN THIS CHALLENGE';
  joinBtn.disabled    = isEnrolled;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  activeModalChallenge = null;
}

// ── JOIN FROM MODAL ─────────────────────────────────────
async function joinFromModal() {
  if (!activeModalChallenge) return;
  const btn = document.getElementById('modalJoinBtn');
  await doJoin(activeModalChallenge.key, btn);
  closeModal();
}

async function joinChallenge(challengeKey, btn) {
  await doJoin(challengeKey, btn);
}

// ── CORE JOIN LOGIC ─────────────────────────────────────
// Hits GET /challenge/:challengeKey?phone=PHONE
// Backend sets pendingChallengeKey and sends WhatsApp message
async function doJoin(challengeKey, btn) {
  if (!USER) { showToast('Profile not loaded yet.', 'error'); return; }

  const phone = USER.phone;
  if (!phone) { showToast('Phone number missing from profile.', 'error'); return; }

  const orig = btn.textContent;
  btn.disabled  = true;
  btn.textContent = 'SENDING...';

  try {
    const res = await fetch(
      `${API}/challenge/${encodeURIComponent(challengeKey)}?phone=${encodeURIComponent(phone)}`
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Request failed.');
    }

    showToast('Challenge brief sent to your WhatsApp! Reply JOIN to confirm. 🔥', 'success');

    // Optimistic UI — show "CHECK WHATSAPP" until they confirm via WhatsApp
    btn.textContent   = 'CHECK WHATSAPP';
    btn.style.background = 'var(--accent2)';
    // Actual DB enrollment happens when user replies JOIN on WhatsApp
    // Card will show ENROLLED on next page load after confirmation
  } catch (err) {
    showToast(err.message || 'Something went wrong. Try again.', 'error');
    btn.disabled    = false;
    btn.textContent = orig;
  }
}

// ── TOAST ───────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 4500);
}

// ── UTILS ───────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
